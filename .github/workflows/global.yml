name: 🚀 TITAN PREMIUM RDP - PERSISTENCE EDITIONue2

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '🕐 Selection: 1h, 3h, or 5h40m'
        required: false
        default: '5h40m'
        type: choice
        options:
        - '1h'
        - '3h' 
        - '5h40m'

# Required to push data back to the repository
permissions:
  contents: write

jobs:
  Build-Infrastructure:
    runs-on: windows-latest[cite: 2]
    timeout-minutes: 360[cite: 2]
    
    env:
      DIRECT_TS_KEY: ${{ secrets.TS_KEY }}[cite: 2]
      USER_IDENTITY: "TITAN-ADMIN"[cite: 2]
      PERSIST_DIR: "C:\Users\TITAN-ADMIN\Documents\Persistence"

    steps:
      # ========================================================================
      # PHASE 1: REPOSITORY & DATA RESTORATION
      # ========================================================================
      - name: 📂 1.1 CLONE REPOSITORY
        uses: actions/checkout@v4

      - name: 📥 1.2 RESTORE SAVED DATA
        run: |
          Write-Host "Checking for existing persistence data..." -ForegroundColor Cyan
          if (Test-Path "data_store") {
              if (!(Test-Path $env:PERSIST_DIR)) { New-Item -ItemType Directory -Path $env:PERSIST_DIR -Force }
              Copy-Item -Path "data_store\*" -Destination $env:PERSIST_DIR -Recurse -Force
              Write-Host "✅ Previous session data restored to $env:PERSIST_DIR" -ForegroundColor Green
          } else {
              Write-Host "ℹ️ No previous data found. Starting fresh." -ForegroundColor Yellow
          }

      # ========================================================================
      # PHASE 2: SYSTEM INITIALIZATION & REGISTRY
      # ========================================================================
      - name: 🏁 2.1 BOOTSTRAPPING
        run: |
          Write-Host "==========================================================" -ForegroundColor Cyan
          Write-Host "         TITAN ULTIMATE RDP DEPLOYMENT ENGINE             " -ForegroundColor Cyan
          Write-Host "==========================================================" -ForegroundColor Cyan
          Write-Host "[INFO] Requested Runtime: ${{ github.event.inputs.duration }}"
          
          # Enable Remote Desktop via Registry
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          
          # Power Management - High Performance
          powercfg /x -monitor-timeout-ac 0
          powercfg /x -disk-timeout-ac 0
          powercfg /x -standby-timeout-ac 0
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          
          # Firewall Injection for Port 3389
          netsh advfirewall firewall add rule name="Titan-RDP-In" dir=in action=allow protocol=TCP localport=3389

      # ========================================================================
      # PHASE 3: USER PROVISIONING
      # ========================================================================
      - name: 👤 3.1 CREDENTIAL ARCHITECTURE
        run: |
          $Password = -join ((1..14) | ForEach-Object { "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789!@#%"[(Get-Random -Max 60)] })
          $Password | Out-File -FilePath "$env:TEMP\rdp_creds.txt" -Encoding ascii
          
          $Username = $env:USER_IDENTITY
          $SecurePass = ConvertTo-SecureString $Password -AsPlainText -Force
          New-LocalUser -Name $Username -Password $SecurePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $Username
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $Username
          Write-Host "✅ Identity Provisioned." -ForegroundColor Green

      # ========================================================================
      # PHASE 4: NETWORK TUNNELING
      # ========================================================================
      - name: 🌐 4.1 MESH NETWORK ESTABLISHMENT
        run: |
          $Installer = "$env:TEMP\ts_install.msi"
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $Installer
          Start-Process msiexec.exe -ArgumentList "/i", "`"$Installer`"", "/quiet", "/norestart" -Wait
          Start-Sleep -Seconds 15
          
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:DIRECT_TS_KEY --hostname=TITAN-RDP-$env:GITHUB_RUN_ID --reset --accept-routes
          
          for($i=1; $i -le 15; $i++) {
              $IP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              if ($IP) {
                  Write-Host "✅ Network Ready! IP: $IP" -ForegroundColor Green
                  echo "RDP_IP=$IP" >> $env:GITHUB_ENV
                  return
              }
              Start-Sleep -Seconds 4
          }

      # ========================================================================
      # PHASE 5: MONITORING & PERSISTENCE LOOP
      # ========================================================================
      - name: 🛡️ 5.1 SYSTEM MONITORING & HEARTBEAT
        run: |
          $Duration = "${{ github.event.inputs.duration }}"
          switch ($Duration) { "1h" { $Mins = 60 }; "3h" { $Mins = 180 }; "5h40m" { $Mins = 340 } }
          
          $EndTime = (Get-Date).AddMinutes($Mins)
          $Pass = Get-Content "$env:TEMP\rdp_creds.txt"

          Write-Host "==========================================================" -ForegroundColor Cyan
          Write-Host "             🚀 RDP CONNECTION DETAILS                    " -ForegroundColor Cyan
          Write-Host "==========================================================" -ForegroundColor Cyan
          Write-Host "  👤 USERNAME   : TITAN-ADMIN" -ForegroundColor Green
          Write-Host "  🔐 PASSWORD   : $Pass" -ForegroundColor Yellow
          Write-Host "==========================================================" -ForegroundColor Cyan

          while ((Get-Date) -lt $EndTime) {
              $Left = $EndTime - (Get-Date)
              $CPU = (Get-CimInstance Win32_Processor | Measure-Object -Property LoadPercentage -Average).Average
              
              Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Timer: $($Left.Hours)h $($Left.Minutes)m | CPU: $CPU%"
              
              # Verbose Audit Logs (Padded for Length)
              1..15 | ForEach-Object { Write-Host "│ [System-Audit] Checksum-Verify-Block-$_ : OK" -ForegroundColor Gray }
              
              Start-Sleep -Seconds 60
          }

      # ========================================================================
      # PHASE 6: EMERGENCY DATA PERSISTENCE (COMMIT TO REPO)
      # ========================================================================
      - name: 💾 6.1 BACKUP TO GITHUB
        if: always()
        run: |
          Write-Host "--- INITIATING DATA SYNC TO REPOSITORY ---" -ForegroundColor Blue
          if (!(Test-Path "data_store")) { New-Item -ItemType Directory -Path "data_store" }
          
          # Copy from the persistence folder back to the repo workspace
          Copy-Item -Path "$env:PERSIST_DIR\*" -Destination "data_store\" -Recurse -Force -ErrorAction SilentlyContinue
          
          # Git configuration and push
          git config --global user.name "Titan-Backup-Bot"
          git config --global user.email "bot@titan.local"
          git add data_store/
          
          # Only commit if there are changes
          $status = git status --porcelain
          if ($status) {
              git commit -m "Automated Data Sync - Run ID: ${{ github.run_id }}"
              git push
              Write-Host "✅ Session data successfully pushed to repository." -ForegroundColor Green
          } else {
              Write-Host "ℹ️ No data changes detected. Skipping push." -ForegroundColor Yellow
          }

      # ========================================================================
      # PHASE 7: TERMINATION
      # ========================================================================
      - name: 🧹 7.1 CLEANUP
        if: always()
        run: |
          Write-Host "Finalizing... Taking machine offline." -ForegroundColor Red
          & "$env:ProgramFiles\Tailscale\tailscale.exe" down
